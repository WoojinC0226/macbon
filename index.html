<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MAC-BON 견적서 생성 시스템</title>
<style>
:root{
  --navy:#16404F; --navy-2:#0F2E39; --mist:#E9EFF1; --paper:#F4F5F2;
  --ink:#1C2528; --sub:#6B7A80; --line:#D8DFE1; --warn-c:#BE3A34; --ok:#2E7D5B;
}
*{box-sizing:border-box}
body{margin:0; background:var(--paper); color:var(--ink);
  font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
  -webkit-font-smoothing:antialiased}
.mbq-root{min-height:100vh}
.mbq-top{background:var(--navy); color:#fff; padding:14px 28px; display:flex; align-items:baseline; gap:14px}
.mbq-top h1{margin:0; font-size:17px; font-weight:800; letter-spacing:.14em}
.mbq-top span{font-size:12px; opacity:.65; letter-spacing:.05em}
.mbq-wrap{display:grid; grid-template-columns:440px 1fr; gap:24px; padding:24px 28px; max-width:1440px; margin:0 auto}
@media(max-width:1020px){.mbq-wrap{grid-template-columns:1fr}}

.panel{background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden}
.panel + .panel, section.panel{margin-bottom:16px}
.panel-h{padding:11px 16px; background:var(--mist); font-size:12px; font-weight:800; letter-spacing:.08em; color:var(--navy)}
.panel-b{padding:16px}
.field{margin-bottom:12px}
.field label{display:block; font-size:11px; font-weight:700; color:var(--sub); margin-bottom:5px; letter-spacing:.04em}
.field select,.field input,.field textarea{
  width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:7px;
  font-size:13px; font-family:inherit; background:#fff; color:var(--ink)}
.field select:focus,.field input:focus{outline:2px solid var(--navy); outline-offset:-1px}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.chips{display:flex; flex-wrap:wrap; gap:6px}
.chip{padding:7px 12px; border:1px solid var(--line); border-radius:999px; font-size:12px; cursor:pointer; background:#fff; user-select:none; font-family:inherit}
.chip.on{background:var(--navy); border-color:var(--navy); color:#fff; font-weight:700}
.hint{font-size:11px; color:var(--sub); margin-top:4px; line-height:1.6}
.warn{font-size:12px; color:var(--warn-c); font-weight:700; margin-top:6px}

/* 부자재 행 */
.optrow{display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap}
.optrow:last-of-type{border-bottom:none}
.optname{font-size:12.5px; font-weight:700; width:76px; flex-shrink:0}
.optfixed{font-size:12px; color:var(--ok); font-weight:700}
.seg{display:flex; border:1px solid var(--line); border-radius:7px; overflow:hidden}
.seg-b{padding:6px 10px; font-size:11.5px; border:none; background:#fff; cursor:pointer; font-family:inherit; color:var(--sub); border-right:1px solid var(--line)}
.seg-b:last-child{border-right:none}
.seg-b.on{background:var(--navy); color:#fff; font-weight:700}
.optprice{font-size:12px; margin-left:auto; white-space:nowrap; font-variant-numeric:tabular-nums}
.optprice input{width:64px; padding:4px 6px; border:1px solid var(--line); border-radius:5px; font-size:12px; text-align:right; font-family:inherit; margin:0 2px}
.optprice.muted{color:var(--sub)}

.price-live{margin-top:14px; border-top:1px dashed var(--line); padding-top:12px; font-size:13px}
.price-live .r{display:flex; justify-content:space-between; padding:2.5px 0; color:var(--sub)}
.price-live .r b{color:var(--ink); font-variant-numeric:tabular-nums}
.price-live .r.total{font-size:15px; color:var(--navy); font-weight:800; padding-top:7px}
.price-live .r.total b{color:var(--navy)}
.btn-add{width:100%; margin-top:12px; padding:12px; border:none; border-radius:8px;
  background:var(--navy); color:#fff; font-size:14px; font-weight:800; cursor:pointer; letter-spacing:.05em; font-family:inherit}
.btn-add:hover{background:var(--navy-2)}
.btn-add:disabled{background:#B9C4C8; cursor:not-allowed}
.toggle-line{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--sub); margin-top:10px; cursor:pointer}

/* 견적서 문서 */
.doc-shell{display:flex; flex-direction:column; gap:14px}
.doc-tools{display:flex; gap:10px; justify-content:flex-end; align-items:center}
.doc-tools select{padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-size:12px; font-family:inherit}
.btn-print{padding:10px 22px; background:var(--navy); border:none; color:#fff; border-radius:8px; font-size:13px; font-weight:800; cursor:pointer; letter-spacing:.06em; font-family:inherit}
.btn-print:hover{background:var(--navy-2)}
.doc{background:#fff; border:1px solid var(--line); border-radius:4px; padding:46px 50px;
  box-shadow:0 2px 14px rgba(22,64,79,.09); min-height:700px}
.doc-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid var(--navy); padding-bottom:16px}
.doc-title{font-size:34px; font-weight:900; letter-spacing:.5em; color:var(--navy); margin:0}
.doc-no{font-size:11px; color:var(--sub); text-align:right; line-height:1.8}
.doc-parties{display:grid; grid-template-columns:1fr 1fr; gap:24px; margin:20px 0}
.party h4{margin:0 0 8px; font-size:11px; letter-spacing:.12em; color:var(--sub); font-weight:800}
.party p{margin:2px 0; font-size:13px; line-height:1.65}
.party .co{font-size:15px; font-weight:800; color:var(--navy)}
.doc-table{width:100%; border-collapse:collapse; margin-top:6px; font-size:12.5px}
.doc-table th{background:var(--navy); color:#fff; padding:9px 8px; font-weight:700; font-size:11.5px; letter-spacing:.05em}
.doc-table td{border-bottom:1px solid var(--line); padding:9px 8px; vertical-align:top}
.doc-table td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap}
.doc-table td.ctr{text-align:center; white-space:nowrap}
.item-name{font-weight:700}
.item-detail{font-size:11px; color:var(--sub); margin-top:2px; line-height:1.55}
.rm{background:none; border:none; color:var(--warn-c); cursor:pointer; font-size:11px; text-decoration:underline; padding:0; font-family:inherit}
.doc-empty{padding:52px 0; text-align:center; color:var(--sub); font-size:13px}
.totals{margin-top:14px; margin-left:auto; width:290px; font-size:13px}
.totals .r{display:flex; justify-content:space-between; padding:5px 2px; color:var(--sub)}
.totals .r b{color:var(--ink); font-variant-numeric:tabular-nums}
.totals .grand{border-top:2px solid var(--navy); margin-top:5px; padding-top:9px; font-size:16px; font-weight:900; color:var(--navy)}
.totals .grand b{color:var(--navy)}
.doc-foot{margin-top:26px; font-size:11.5px; color:var(--sub); line-height:1.9; border-top:1px solid var(--line); padding-top:14px}
.margin-tag{display:inline-block; font-size:10px; background:var(--mist); color:var(--navy); border-radius:4px; padding:1px 6px; margin-left:6px; font-weight:700}

@media print{
  body *{visibility:hidden}
  .doc, .doc *{visibility:visible}
  .doc{position:absolute; inset:0; border:none; box-shadow:none; border-radius:0; padding:20px 8px}
  .rm, .margin-tag, .grade-tag{display:none !important}
}

/* ══════════ 모바일 대응 ══════════ */
.mbtab{display:none}
@media(max-width:760px){
  .mbq-top{padding:12px 16px}
  .mbq-wrap{grid-template-columns:1fr; padding:14px 12px 90px; gap:0}
  /* 탭 전환: 활성 페인만 표시 */
  .pane{display:none}
  .pane.active{display:block}
  .pane-doc.active{display:flex}

  /* 입력 편의: iOS 자동 줌 방지(16px) + 터치 타깃 확대 */
  .field select,.field input{font-size:16px; padding:12px 12px; border-radius:9px}
  .chip{padding:10px 15px; font-size:14px}
  .seg-b{padding:10px 12px; font-size:13px}
  .optname{width:100%; margin-bottom:2px}
  .optrow{padding:10px 0}
  .optprice{margin-left:auto}
  .optprice input{width:76px; padding:8px; font-size:15px}
  .btn-add{padding:15px; font-size:15px}
  .panel-b{padding:14px}

  /* 견적서 문서: 모바일 여백/타이포 */
  .doc-tools{flex-wrap:wrap; justify-content:stretch}
  .doc-tools select{flex:1; padding:11px 10px; font-size:14px}
  .btn-print{flex:1; padding:13px; font-size:14px}
  .doc{padding:22px 16px; min-height:auto; border-radius:10px}
  .doc-head{flex-direction:column; gap:10px}
  .doc-title{font-size:24px; letter-spacing:.32em}
  .doc-no{text-align:left}
  .doc-parties{grid-template-columns:1fr; gap:14px; margin:16px 0}
  .totals{width:100%}

  /* 표 → 카드형 변환 */
  .doc-table thead{display:none}
  .doc-table, .doc-table tbody, .doc-table tr, .doc-table td{display:block; width:100%}
  .doc-table tr{border:1px solid var(--line); border-radius:9px; padding:11px 12px; margin-bottom:9px; position:relative; background:#fff}
  .doc-table td{border:none; padding:2px 0}
  .doc-table td.ctr, .doc-table td.num{text-align:left; display:flex; justify-content:space-between; align-items:baseline; padding:3px 0}
  .doc-table td[data-label]::before{content:attr(data-label); font-size:11px; color:var(--sub); font-weight:700}
  .doc-table td.td-rm{position:absolute; top:9px; right:12px; width:auto; padding:0}
  .doc-empty{border:1px dashed var(--line); border-radius:9px}

  /* 하단 고정 탭바 */
  .mbtab{display:flex; position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:#fff; border-top:1px solid var(--line); box-shadow:0 -4px 16px rgba(22,64,79,.10);
    padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
  .mbtab button{flex:1; margin:0 4px; border:none; background:none; border-radius:10px;
    padding:8px 6px; cursor:pointer; font-family:inherit; text-align:center}
  .mbtab button.on{background:var(--mist)}
  .mbtab-t{display:block; font-size:13px; font-weight:800; color:var(--sub)}
  .mbtab button.on .mbtab-t{color:var(--navy)}
  .mbtab-s{display:block; font-size:10.5px; color:var(--sub); margin-top:2px; font-variant-numeric:tabular-nums;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .badge{display:inline-block; font-style:normal; background:var(--navy); color:#fff; border-radius:999px;
    font-size:10px; padding:1px 6px; margin-left:4px; vertical-align:middle}
}
@media print{ .mbtab{display:none !important} .pane{display:block !important} }

/* 적요 셀 */
.remark-td{font-size:11.5px; color:var(--sub); line-height:1.5; word-break:break-all}
@media(max-width:760px){
  .doc-table td.remark-td{display:flex; justify-content:space-between; padding:3px 0}
}

/* 등급 배지(화면 전용 · 인쇄 제외) */
.grade-tag{display:inline-block; font-size:10px; background:#F3EDE2; color:#8A6D2F; border-radius:4px; padding:1px 6px; margin-left:6px; font-weight:700}
/* 소량 대응 안내 */
.moq-info{font-size:12px; color:var(--navy); background:var(--mist); border-radius:7px; padding:8px 10px; margin-top:6px; line-height:1.6}

</style>
</head>
